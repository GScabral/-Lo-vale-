<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Financiera Argentina 2026</title>
  <link rel="icon" type="image/png" href="./favicon.png">

  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1408479860271651"
    crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #020617;
      --card: rgba(30, 41, 59, .78);
      --border: #334155;
      --text: #e2e8f0;
      --accent: #22c55e;
      --danger: #ef4444;
      --muted: #94a3b8;
      --blue: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
    }

    .container {
      max-width: 1050px;
      margin: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 20px;
      transition: transform .2s ease, box-shadow .2s ease;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .25);
    }

    .dolar-box {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      border-left: 5px solid var(--blue);
      font-weight: 700;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    h3 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: .92rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #020617;
      color: white;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .15);
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 15px;
    }

    .checkbox input {
      width: auto;
      margin: 0;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      font-weight: 700;
      transition: .2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      color: #052e16;
      width: 100%;
      margin-bottom: 10px;
    }

    .btn-pdf {
      width: 100%;
      background: #475569;
      color: white;
    }

    .btn-toggle {
      background: #334155;
      color: white;
      min-width: 140px;
    }

    .highlight {
      color: var(--accent);
      font-weight: 700;
    }

    .rojo {
      color: var(--danger);
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
      margin-top: 15px;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: .92rem;
    }

    th {
      background: #0f172a;
      color: var(--accent);
    }

    #graficoCont {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .small {
      font-size: .85rem;
      color: var(--muted);
    }

    .warning {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .35);
      color: #fecaca;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 15px;
      display: none;
    }

    @media (max-width: 760px) {
      .container {
        display: flex;
        /* Asegúrate de que tenga display flex */
        flex-direction: column;
        text-align: center;
        gap: 10px;
      }
    }

    .checkbox {
      flex-direction: column;
      text-align: center;
    }

    button,
    .btn-primary,
    .btn-pdf,
    .btn-toggle {
      width: 100%;
      min-width: 0;
    }

    #graficoCont {
      overflow-x: auto;
      padding: 10px;
    }

    #grafico {
      min-width: 520px;
      height: 260px !important;
    }

    table {
      display: block;
      overflow-x: auto;
      white-space: nowrap;
    }

    th,
    td {
      font-size: .82rem;
      padding: 10px 8px;
    }


    @media (max-width: 480px) {
      body {
        padding: 8px;
      }

      h1 {
        font-size: 1.3rem;
      }

      #grafico {
        min-width: 460px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Calculadora Financiera Argentina 2026</h1>
    <p class="small">Compara cuánto dinero podrías conservar si compras un bien o si inviertes ese dinero.</p>

    <div class="card dolar-box" id="dolarBox">
      Sincronizando cotizaciones...
    </div>
    <div class="card" style="text-align:center; padding:18px;">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1408479860271651" data-ad-slot="3752724585"
        data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <div class="topbar">
      <button class="btn-toggle" id="btnMoneda">Moneda: <span id="monedaTxt">ARS</span></button>
      <span id="status" class="small">Cargando datos...</span>
    </div>

    <div class="warning" id="warning"></div>

    <div class="grid">
      <div class="card">
        <h3>💰 Fondos</h3>

        <label>Capital inicial</label>
        <input type="number" id="capital" min="0" step="1">

        <label>Otros activos</label>
        <input type="number" id="activos" min="0" step="1" value="0">

        <label>Precio del bien</label>
        <input type="number" id="precio" min="0" step="1">
      </div>

      <div class="card">
        <h3>📈 Indicadores</h3>

        <label>TNA (%)</label>
        <input type="number" id="tasa" min="0" step="0.01">

        <label>Inflación anual (%)</label>
        <input type="number" id="inflacion" min="0" step="0.01">

        <label>Aporte mensual</label>
        <input type="number" id="aporte" min="0" step="1" value="0">

        <label>Años</label>
        <input type="number" id="anios" min="1" step="1" value="3">
      </div>
    </div>

    <div class="card" style="text-align:center;">
      <div class="checkbox">
        <input type="checkbox" id="ajustarInflacion" checked>
        <label for="ajustarInflacion" style="margin:0;">Ajustar rendimiento por inflación</label>
      </div>

      <button class="btn-primary" id="btnAnalizar">ANALIZAR</button>
      <button class="btn-pdf" id="btnPDF">DESCARGAR PDF</button>
    </div>
    <div class="card" style="text-align:center; padding:18px;">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1408479860271651" data-ad-slot="3752724585"
        data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <div id="resultado" style="display:none;">
      <div class="card" id="resumen"></div>
      <div class="card" id="explicacion"></div>
      <div id="graficoCont">
        <canvas id="grafico"></canvas>
      </div>
      <div class="card">
        <div id="tabla"></div>
      </div>
    </div>
  </div>

  <script>
    let chart;
    let moneda = 'ARS';
    let dolarBlue = 1430;
    let dolarOficial = 1000;

    const formatoARS = new Intl.NumberFormat('es-AR', {
      style: 'currency',
      currency: 'ARS',
      maximumFractionDigits: 0
    });

    const formatoUSD = new Intl.NumberFormat('es-AR', {
      style: 'currency',
      currency: 'USD',
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    const campos = ['capital', 'activos', 'precio', 'tasa', 'inflacion', 'aporte', 'anios'];

    function guardarDatos() {
      campos.forEach(id => localStorage.setItem(id, document.getElementById(id).value));
      localStorage.setItem('ajustarInflacion', document.getElementById('ajustarInflacion').checked);
    }

    function cargarDatos() {
      campos.forEach(id => {
        const value = localStorage.getItem(id);
        if (value !== null) document.getElementById(id).value = value;
      });

      const ajustar = localStorage.getItem('ajustarInflacion');
      if (ajustar !== null) {
        document.getElementById('ajustarInflacion').checked = ajustar === 'true';
      }
    }

    function formatear(valor) {
      return moneda === 'USD'
        ? formatoUSD.format(valor / dolarBlue)
        : formatoARS.format(valor);
    }

    async function sincronizarMercado() {
      const status = document.getElementById('status');

      try {
        const [blueRes, oficialRes] = await Promise.all([
          fetch('https://dolarapi.com/v1/dolares/blue'),
          fetch('https://dolarapi.com/v1/dolares/oficial')
        ]);

        const blue = await blueRes.json();
        const oficial = await oficialRes.json();

        dolarBlue = blue.venta;
        dolarOficial = oficial.venta;

        document.getElementById('dolarBox').innerHTML = `
          💵 Dólar blue: ${formatoARS.format(dolarBlue)}
          ·
          🏛️ Dólar oficial: ${formatoARS.format(dolarOficial)}
        `;

        if (!document.getElementById('tasa').value) document.getElementById('tasa').value = 45;
        if (!document.getElementById('inflacion').value) document.getElementById('inflacion').value = 120;

        status.textContent = '✓ Datos actualizados';
        status.style.color = '#22c55e';
      } catch (error) {
        document.getElementById('dolarBox').innerHTML = `
          💵 Dólar blue de referencia: ${formatoARS.format(dolarBlue)}
        `;

        status.textContent = '⚠ Sin conexión con la API';
        status.style.color = '#ef4444';
      }
    }

    function valorFuturo(capitalInicial, aporteMensual, tasaMensual, meses) {
      if (tasaMensual === 0) {
        return capitalInicial + (aporteMensual * meses);
      }

      return capitalInicial * Math.pow(1 + tasaMensual, meses) +
        aporteMensual * ((Math.pow(1 + tasaMensual, meses) - 1) / tasaMensual);
    }

    function mostrarWarning(texto) {
      const el = document.getElementById('warning');
      el.textContent = texto;
      el.style.display = 'block';
    }

    function ocultarWarning() {
      document.getElementById('warning').style.display = 'none';
    }

    function calcular() {
      ocultarWarning();
      guardarDatos();

      const capital = Number(document.getElementById('capital').value);
      const activos = Number(document.getElementById('activos').value) || 0;
      const precio = Number(document.getElementById('precio').value);
      const aporte = Number(document.getElementById('aporte').value) || 0;
      const tasa = Number(document.getElementById('tasa').value) / 100;
      const inflacion = Number(document.getElementById('inflacion').value) / 100;
      const anios = Number(document.getElementById('anios').value);
      const ajustar = document.getElementById('ajustarInflacion').checked;

      if (!capital || !precio || !anios) {
        mostrarWarning('Debes completar capital inicial, precio del bien y años.');
        return;
      }

      if (anios <= 0) {
        mostrarWarning('Los años deben ser mayores que 0.');
        return;
      }

      const patrimonio = capital + activos;

      if (precio > patrimonio) {
        mostrarWarning('El precio del bien supera tus fondos disponibles.');
        return;
      }

      const restante = Math.max(0, patrimonio - precio);

      const tasaMensual = Math.pow(1 + tasa, 1 / 12) - 1;
      const inflacionMensual = Math.pow(1 + inflacion, 1 / 12) - 1;
      const rendimientoReal = ajustar
        ? ((1 + tasaMensual) / (1 + inflacionMensual)) - 1
        : tasaMensual;

      const labels = [];
      const sinComprar = [];
      const comprando = [];

      let html = `
        <table>
          <thead>
            <tr>
              <th>Año</th>
              <th>Sin comprar</th>
              <th>Comprando</th>
              <th>Diferencia</th>
              <th>Impacto %</th>
            </tr>
          </thead>
          <tbody>
      `;

      for (let i = 1; i <= anios; i++) {
        const meses = i * 12;

        const v1 = valorFuturo(patrimonio, aporte, rendimientoReal, meses);
        const v2 = valorFuturo(restante, aporte, rendimientoReal, meses);

        const diferencia = v1 - v2;
        const impacto = v1 === 0 ? 0 : (diferencia / v1) * 100;

        labels.push(`Año ${i}`);
        sinComprar.push(v1);
        comprando.push(v2);

        html += `
          <tr>
            <td>${i}</td>
            <td>${formatear(v1)}</td>
            <td>${formatear(v2)}</td>
            <td class="${diferencia >= 0 ? 'highlight' : 'rojo'}">${formatear(diferencia)}</td>
            <td class="${impacto >= 0 ? 'highlight' : 'rojo'}">${impacto.toFixed(2)}%</td>
          </tr>
        `;
      }

      html += '</tbody></table>';
      document.getElementById('tabla').innerHTML = html;

      const finalSin = sinComprar.at(-1);
      const finalCon = comprando.at(-1);
      const diferenciaFinal = finalSin - finalCon;
      const impactoFinal = (diferenciaFinal / finalSin) * 100;

      document.getElementById('resumen').innerHTML = `
        <h3>📊 Resultado final</h3>
        <p>Patrimonio proyectado sin comprar: <span class="highlight">${formatear(finalSin)}</span></p>
        <p>Patrimonio proyectado comprando: <span class="highlight">${formatear(finalCon)}</span></p>
        <p>Diferencia final: <span class="${diferenciaFinal >= 0 ? 'highlight' : 'rojo'}">${formatear(diferenciaFinal)}</span></p>
        <p>Impacto estimado: <span class="${impactoFinal >= 0 ? 'highlight' : 'rojo'}">${impactoFinal.toFixed(2)}%</span></p>
      `;

      document.getElementById('explicacion').innerHTML = `
        <h3>🧾 Cómo interpretar el análisis</h3>
        <ul>
          <li><strong>Sin comprar</strong>: mantienes todo el capital invertido.</li>
          <li><strong>Comprando</strong>: compras el bien y solo inviertes el dinero restante.</li>
          <li>La diferencia muestra el coste de oportunidad de comprar.</li>
          <li>${ajustar ? 'El rendimiento está ajustado por inflación.' : 'El rendimiento NO está ajustado por inflación.'}</li>
        </ul>
      `;

      document.getElementById('resultado').style.display = 'block';

      if (chart) chart.destroy();

      chart = new Chart(document.getElementById('grafico'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Invertir sin comprar',
              data: sinComprar,
              borderColor: '#22c55e',
              backgroundColor: 'rgba(34,197,94,.15)',
              fill: true,
              tension: .3
            },
            {
              label: 'Comprar e invertir el resto',
              data: comprando,
              borderColor: '#ef4444',
              backgroundColor: 'rgba(239,68,68,.12)',
              fill: true,
              tension: .3
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: {
                color: '#111827'
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: '#111827'
              }
            },
            y: {
              ticks: {
                color: '#111827',
                callback: value => moneda === 'USD'
                  ? '$' + (value / dolarBlue).toFixed(0)
                  : '$' + value.toLocaleString('es-AR')
              }
            }
          }
        }
      });
    }

    function generarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(18);
      doc.text('Reporte financiero', 15, 18);

      doc.setFontSize(10);
      doc.text(`Fecha: ${new Date().toLocaleDateString('es-AR')}`, 15, 26);
      doc.text(`Moneda mostrada: ${moneda}`, 15, 32);

      const resumen = document.getElementById('resumen').innerText.split('\n');

      let y = 42;
      resumen.forEach(linea => {
        if (linea.trim()) {
          doc.text(linea, 15, y);
          y += 6;
        }
      });

      doc.autoTable({
        html: '#tabla table',
        startY: y + 4,
        styles: {
          fontSize: 9
        },
        headStyles: {
          fillColor: [34, 197, 94]
        }
      });

      const canvas = document.getElementById('grafico');
      const img = canvas.toDataURL('image/png');

      doc.addPage();
      doc.setFontSize(16);
      doc.text('Gráfico comparativo', 15, 20);
      doc.addImage(img, 'PNG', 10, 30, 190, 90);

      doc.save('reporte-financiero.pdf');
    }

    document.getElementById('btnMoneda').addEventListener('click', () => {
      moneda = moneda === 'ARS' ? 'USD' : 'ARS';
      document.getElementById('monedaTxt').textContent = moneda;

      if (document.getElementById('resultado').style.display === 'block') {
        calcular();
      }
    });

    document.getElementById('btnAnalizar').addEventListener('click', calcular);
    document.getElementById('btnPDF').addEventListener('click', generarPDF);

    cargarDatos();
    sincronizarMercado();
  </script>
</body>

</html>
