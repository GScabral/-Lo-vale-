<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>¿Lo vale?</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: #e2e8f0;
    padding: 20px;
}

.container { max-width: 1100px; margin: auto; }

.card {
    background: rgba(30,41,59,0.7);
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 15px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #020617;
    color: white;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-primary { background:#22c55e; }
.btn-toggle { background:#1e293b; color:#94a3b8; }

.ad {
    background: #020617;
    border: 1px dashed #334155;
    padding: 15px;
    text-align: center;
    margin: 20px 0;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    text-align: center;
}

th { background:#1e293b; }

.verde { background: rgba(34,197,94,0.15); }

.rojo { color:#ef4444; }

.info {
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="card" id="dolarBox">Cargando dólar...</div>

<button class="btn-toggle" onclick="cambiarMoneda()">
Moneda: <span id="monedaTxt">ARS</span>
</button>

<div class="ad">Publicidad</div>

<div class="grid">
<div class="card">
<h3>Datos</h3>
<input id="capital" placeholder="Capital">
<input id="activos" placeholder="Activos">
<input id="precio" placeholder="Precio del bien">
</div>

<div class="card">
<h3>Inversión</h3>
<input id="tasa" placeholder="Tasa anual %">
<input id="anios" placeholder="Años">
<input id="aporte" placeholder="Aporte mensual">
<input id="objetivo" placeholder="Objetivo mensual">
</div>
</div>

<div class="card">
<h3>Inflación</h3>
<input id="inflacion" placeholder="Inflación anual %">

<button class="btn-toggle" onclick="cargarInflacion()">Usar inflación estimada</button>

<label>
<input type="checkbox" id="ajustarInflacion" checked>
 Ajustar por inflación
</label>

<p class="info">
📉 Si está activado, los valores reflejan poder adquisitivo real
</p>
</div>

<button class="btn-primary" onclick="calcular()">Calcular</button>

<div class="ad">Publicidad</div>

<div class="card" id="resumen"></div>
<div class="card" id="tabla"></div>

<canvas id="grafico"></canvas>

<div class="ad">Publicidad</div>

</div>

<script>
let chart;
let dolar=1000;
let moneda="ARS";

/* DOLAR */
async function obtenerDolar(){
try{
let res=await fetch("https://dolarapi.com/v1/dolares/blue");
let data=await res.json();
dolar=data.venta;

document.getElementById("dolarBox").innerHTML=
`💵 Dólar Blue: $${dolar}`;

}catch{
document.getElementById("dolarBox").innerHTML="Error dólar";
}
}
obtenerDolar();

/* INFLACION */
async function cargarInflacion(){
try{
let res=await fetch("https://api.argentinadatos.com/v1/finanzas/indices/inflacion");
let data=await res.json();
let ultimo=data[data.length-1].valor;
let anual=ultimo*12;

document.getElementById("inflacion").value=anual.toFixed(2);
}catch{
alert("Error inflación");
}
}

/* MONEDA */
function cambiarMoneda(){
moneda = moneda==="ARS" ? "USD" : "ARS";
document.getElementById("monedaTxt").innerText=moneda;
}

/* FORMATO */
function f(v){
return moneda==="USD" ? "$"+(v/dolar).toFixed(2) : "$"+v.toFixed(0);
}

function calcular(){

let capital=+document.getElementById("capital").value||0;
let activos=+document.getElementById("activos").value||0;
let precio=+document.getElementById("precio").value||0;

if(moneda==="USD"){
capital*=dolar;
activos*=dolar;
precio*=dolar;
}

let tasa=(+document.getElementById("tasa").value||0)/100;
let anios=+document.getElementById("anios").value||0;
let aporte=+document.getElementById("aporte").value||0;
let inflacion=(+document.getElementById("inflacion").value||0)/100;

let ajustar=document.getElementById("ajustarInflacion").checked;

let patrimonio=capital+activos;
let restante=patrimonio-precio;

let tm=tasa/12;
let im=inflacion/12;

let tabla=`<table><tr>
<th>Año</th><th>Comprando</th><th>Sin comprar</th>
<th>Inv. comprando</th><th>Inv. sin comprar</th>
</tr>`;

let labels=[],sin=[],con=[];
let dif=0;

for(let i=1;i<=anios;i++){

let meses=i*12;

let c=restante,s=patrimonio,ic=restante,is=patrimonio;

for(let m=0;m<meses;m++){

c*=(1+tm);
s*=(1+tm);
ic=(ic+aporte)*(1+tm);
is=(is+aporte)*(1+tm);

/* SOLO SI ESTA ACTIVADO */
if(ajustar){
c/=(1+im);
s/=(1+im);
ic/=(1+im);
is/=(1+im);
}
}

dif=is-ic;

tabla+=`<tr>
<td>${i}</td>
<td>${f(c)}</td>
<td>${f(s)}</td>
<td>${f(ic)}</td>
<td>${f(is)}</td>
</tr>`;

labels.push(i);
sin.push(is);
con.push(ic);
}

tabla+="</table>";
document.getElementById("tabla").innerHTML=tabla;

let mensaje=dif>0?`<p class="rojo">💸 Pierdes ${f(dif)}</p>`:"";

document.getElementById("resumen").innerHTML=`
<h3>Resumen</h3>
<p>Patrimonio: ${f(patrimonio)}</p>
<p>Compra: ${f(precio)}</p>
${mensaje}
`;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("grafico"),{
type:"line",
data:{
labels,
datasets:[
{label:"Sin comprar",data:sin},
{label:"Comprando",data:con}
]
}
});
}
</script>

</body>
</html>
