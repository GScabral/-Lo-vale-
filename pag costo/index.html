<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>¿Lo vale?</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: #e2e8f0;
    padding: 20px;
}

.container { max-width: 1100px; margin: auto; }

.card {
    background: rgba(30,41,59,0.7);
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 15px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #020617;
    color: white;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-primary { background:#22c55e; }
.btn-toggle { background:#1e293b; color:#94a3b8; }

.ad {
    background: #020617;
    border: 1px dashed #334155;
    padding: 15px;
    text-align: center;
    margin: 20px 0;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    text-align: center;
}

th { background:#1e293b; }

.verde { background: rgba(34,197,94,0.2); }
.rojo { color:#ef4444; }

.info { font-size:12px; opacity:0.7; }

.highlight { color:#22c55e; font-weight:bold; }

.dolar-box{
display:flex;
justify-content:space-around;
font-weight:bold;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<div class="card dolar-box" id="dolarBox">Cargando dólar...</div>

<button class="btn-toggle" onclick="cambiarMoneda()">
Moneda: <span id="monedaTxt">ARS</span>
</button>

<div class="ad">Publicidad</div>

<div class="grid">
<div class="card">
<h3>Datos</h3>
<input id="capital" placeholder="Capital">
<input id="activos" placeholder="Activos">
<input id="precio" placeholder="Precio del bien">
</div>

<div class="card">
<h3>Inversión</h3>
<input id="tasa" placeholder="Tasa anual %">
<input id="anios" placeholder="Años">
<input id="aporte" placeholder="Aporte mensual">
<input id="objetivo" placeholder="Objetivo mensual">
</div>
</div>

<div class="card">
<h3>Inflación</h3>
<input id="inflacion" placeholder="Inflación anual %">

<label>
<input type="checkbox" id="ajustarInflacion" checked>
 Ajustar por inflación
</label>
</div>

<button class="btn-primary" onclick="calcular()">Calcular</button>

<div class="ad">Publicidad</div>

<div class="card" id="resumen"></div>
<div class="card" id="tabla"></div>

<canvas id="grafico"></canvas>

</div>

<script>

let chart;
let dolarBlue=1000;
let dolarOficial=800;
let moneda="ARS";

/* DOLAR */
async function obtenerDolar(){
try{
let blue = await fetch("https://dolarapi.com/v1/dolares/blue").then(r=>r.json());
let oficial = await fetch("https://dolarapi.com/v1/dolares/oficial").then(r=>r.json());

dolarBlue = blue.venta;
dolarOficial = oficial.venta;

document.getElementById("dolarBox").innerHTML=
`💙 Blue: $${dolarBlue} | 🏦 Oficial: $${dolarOficial}`;

}catch{
document.getElementById("dolarBox").innerHTML="Error dólar";
}
}
obtenerDolar();

/* MONEDA */
function cambiarMoneda(){
moneda = moneda==="ARS" ? "USD" : "ARS";
document.getElementById("monedaTxt").innerText=moneda;
}

/* FORMATO */
function f(v){
return moneda==="USD" 
? "$"+(v/dolarBlue).toFixed(2)
: "$"+v.toLocaleString("es-AR");
}

function calcular(){

let capital=+document.getElementById("capital").value||0;
let activos=+document.getElementById("activos").value||0;
let precio=+document.getElementById("precio").value||0;

if(moneda==="USD"){
capital*=dolarBlue;
activos*=dolarBlue;
precio*=dolarBlue;
}

let tasa=(+document.getElementById("tasa").value||0)/100;
let anios=+document.getElementById("anios").value||0;
let aporte=+document.getElementById("aporte").value||0;
let inflacion=(+document.getElementById("inflacion").value||0)/100;
let ajustar=document.getElementById("ajustarInflacion").checked;

let patrimonio=capital+activos;
let restante=patrimonio-precio;

/* 🧠 NUEVO CALCULO */
let porcentaje = (precio/patrimonio)*100;
let veces = patrimonio/precio;

let tm=tasa/12;
let im=inflacion/12;

let tabla=`<table><tr>
<th>Año</th><th>Comprando</th><th>Sin comprar</th>
<th>Inv. comprando</th><th>Inv. sin comprar</th>
</tr>`;

let labels=[],sin=[],con=[];

for(let i=1;i<=anios;i++){

let meses=i*12;

let c=restante,s=patrimonio,ic=restante,is=patrimonio;

for(let m=0;m<meses;m++){

c*=(1+tm);
s*=(1+tm);
ic=(ic+aporte)*(1+tm);
is=(is+aporte)*(1+tm);

if(ajustar){
c/=(1+im);
s/=(1+im);
ic/=(1+im);
is/=(1+im);
}
}

tabla+=`<tr>
<td>${i}</td>
<td>${f(c)}</td>
<td>${f(s)}</td>
<td>${f(ic)}</td>
<td>${f(is)}</td>
</tr>`;

labels.push(i);
sin.push(is);
con.push(ic);
}

tabla+="</table>";
document.getElementById("tabla").innerHTML=tabla;

let dif=sin.at(-1)-con.at(-1);

document.getElementById("resumen").innerHTML=`
<h3>📊 Resumen</h3>

<p>Patrimonio: <span class="highlight">${f(patrimonio)}</span></p>
<p>Precio del bien: ${f(precio)}</p>

<p>📉 Representa: <span class="rojo">${porcentaje.toFixed(2)}%</span> de tu patrimonio</p>
<p>🧮 Podrías comprarlo <span class="highlight">${veces.toFixed(2)}</span> veces</p>

<p class="${dif>0?'rojo':''}">
${dif>0?'💸 Invertir es mejor que comprar':'✔ Comprar no afecta tanto'}
</p>
`;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("grafico"),{
type:"line",
data:{
labels,
datasets:[
{label:"Sin comprar",data:sin},
{label:"Comprando",data:con}
]
}
});

}

</script>

</body>
</html>
